name: Python Lint

on:
  push:

jobs:
  flake8:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flake8
      - run: flake8 . --ignore=E501,E302,E305,E231,E225,E226,E201,E202,E203,W503
